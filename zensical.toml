[project]

site_name = "Sage Periods"
site_description = "A Sage package for computing Picard-Fuchs operators for rational period integrals"
site_author = "Stephen Melczer, John Hunn Smith"

copyright = """
Copyright &copy; 2026 Stephen Melczer, John Hunn Smith
"""

extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]
[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.toc]
permalink = "¶"
permalink_title = "Anchor link to this section"

# For mkdocstrings
[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "sphinx"
inherited_members = true
show_source = false
show_root_heading = true

[project.theme]

favicon = "images/oint_bold_outlined.png"
language = "en"

features = [
    "announce.dismiss",

    "content.code.annotate",

    "content.code.copy",

    "content.code.select",

    "content.footnote.tooltips",

    "content.tabs.link",

    "content.tooltips",

    "navigation.footer",

    "navigation.indexes",

    "navigation.instant",

    "navigation.instant.prefetch",

    "navigation.path",

    "navigation.sections",

    "navigation.top",

    "navigation.tracking",

    "search.highlight",

"toc.follow",

"toc.integrate",
]

logo = "images/oint_bold_outlined.png"


[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

